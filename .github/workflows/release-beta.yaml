name: Release BETA

# ベータ版の自動公開。
#
# モデル: 「main は常にベータ版として生きている」
#   - main への push のたびに、package.json の version が直近タグより先行していれば
#     （= まだ本番公開していない未リリース版があれば）ベータ版を BETA リスティングへ公開する。
#   - version が直近タグと同じ（= 未公開の変更が無い）場合は何もしない。
#
# Chrome Webstore は同一リスティングへ同じ version を再アップロードできないため、
# manifest.version は「<base>.<直近タグからの commit 数>」で単調増加させる（例 4.9.0.5）。
# 表示用の version_name には SemVer 形式の "4.9.0-beta.5" を入れる。
#
# 本番公開は GitHub Release の作成（release-prod.yaml）で行う。

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "design/**"

concurrency:
  group: release-beta
  cancel-in-progress: true

jobs:
  release_beta:
    runs-on: ubuntu-latest
    env:
      GOOGLEAPI_CLIENT_ID: ${{ secrets.GOOGLEAPI_CLIENT_ID }}
      GOOGLEAPI_CLIENT_SECRET: ${{ secrets.GOOGLEAPI_CLIENT_SECRET }}
      GOOGLEAPI_REFRESH_TOKEN: ${{ secrets.GOOGLEAPI_REFRESH_TOKEN }}
      CHROMEWEBSTORE_EXTENSION_ID: egkgleinehaapbpijnlpbllfeejjpceb
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # タグと commit 数を数えるため全履歴を取得
      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install

      - name: ベータ版バージョンを算出（未公開の版が無ければスキップ）
        id: ver
        run: |
          BASE=$(jq -r .version package.json)
          LASTTAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          LASTVER=${LASTTAG#v}
          echo "[INFO] package.json version: ${BASE}"
          echo "[INFO] latest tag: ${LASTTAG:-(none)}"
          if [ "${BASE}" = "${LASTVER}" ]; then
            echo "[INFO] package.json(${BASE}) は直近タグと同一。未公開の変更が無いためベータ公開をスキップします。"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "${LASTTAG}" ]; then
            N=$(git rev-list "${LASTTAG}..HEAD" --count)
          else
            N=$(git rev-list HEAD --count)
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "version=${BASE}.${N}" >> "$GITHUB_OUTPUT"
          echo "version_name=${BASE}-beta.${N}" >> "$GITHUB_OUTPUT"
          echo "[INFO] BETA version=${BASE}.${N} (version_name=${BASE}-beta.${N})"

      - name: ビルド（beta チャンネル）
        if: steps.ver.outputs.skip == 'false'
        env:
          KCW_CHANNEL: beta
          KCW_VERSION: ${{ steps.ver.outputs.version }}
          KCW_VERSION_NAME: ${{ steps.ver.outputs.version_name }}
        run: |
          pnpm build
          pnpm run remove-remote-code
          make package

      - name: Webstore へ公開（BETA）
        if: steps.ver.outputs.skip == 'false'
        run: npx -y tsx scripts/webstore-publish.ts ./release/艦これウィジェット.zip
